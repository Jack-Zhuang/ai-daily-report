ut their practical gains are often limited by poor parameter efficiency and rapid memory growth. We attribute these limitations to Zipfian under-training of the long tail, heterogeneous demand across layers, and \"slot collapse\" that produces redundant embeddings. To address this, we propose X-GRAM, a frequency-aware dynamic token-injection framework. X-GRAM employs hybrid hashing and alias mixing to compress the tail wh", "link": "http://arxiv.org/abs/2604.21724v1", "category": "agent", "published": "2026-04-23", "industry_score": 2, "paper_value": 2.03, "type": "paper", "scores": {"innovation": 4.0, "industry": 4.0, "experiment": 4.0}, "overall_score": 4.0}, {"id": "2604.21611", "arxiv_id": "2604.21611", "title": "Process Supervision via Verbal Critique Improves Reasoning in Large Language Models", "summary": "Inference-time scaling for LLM reasoning has focused on three axes: chain depth, sample breadth, and learned step-scorers (PRMs). We introduce a fourth axis, granularity of external verbal supervision, via Verbal Process Supervision (VPS), a training-free framework that uses structured natural-language critique from a stronger supervisor to guide an iterative generate-critique-refine loop up to a round budget R. Across GPQA Diamond, AIME 2025, and LiveCodeBench V6 (covering both closed and open ", "link": "http://arxiv.org/abs/2604.21611v1", "category": "agent", "published": "2026-04-23", "industry_score": 2, "paper_value": 2.03, "type": "paper", "scores": {"innovation": 4.0, "industry": 4.0, "experiment": 4.0}, "overall_score": 4.0}, {"id": "2604.21238", "arxiv_id": "2604.21238", "title": "Unlocking the Power of Large Language Models for Multi-table Entity Matching", "summary": "Multi-table entity matching (MEM) addresses the limitations of dual-table approaches by enabling simultaneous identification of equivalent entities across multiple data sources without unique identifiers. However, existing methods relying on pre-trained language models struggle to             for (let i = 0; i < fullStars; i++) html += '★';
            if (hasHalf) html += '☆';
            return html;
        }
